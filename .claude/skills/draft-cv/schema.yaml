# CV Seed Schema
# Format-agnostic intermediate representation of a tailored CV.
# Generated by /draft-cv from personal-data/. Read by renderer commands (/resumx-cv, /latex-cv).
# This file is a reference spec — actual seed files live in jobs/[company-role]/.

meta:
  generated: string          # YYYY-MM-DD_HH-mm — from `date` command at generation time
  jd: string                 # relative path to source YYYY-MM-DD_HH-MM_jd.md file
  target_role: string        # human-readable role label, e.g. "Frontend React V.I.E." — used by renderers for file naming or CV header
  region: string             # "eu" | "sea" | "us" — affects date format, page-length expectations, and renderer warnings

contact:
  name: string
  location: string           # city, country only — no street address
  email: string
  phone: string
  linkedin: string           # handle only — e.g. "your-handle" (not full URL)
  github: string             # handle only — e.g. "your-handle" (not full URL)

summary: string              # 3–4 line positioning statement as plain prose

competencies:               # OPTIONAL — 6–8 keyword phrases for the Core Competencies section
  - string                  # Each phrase: 2–4 words, title case, e.g. "API Architecture"
                            # Populated by /draft-cv. Omit field entirely if no JD was analysed.

experience:
  - company: string
    location: string         # OPTIONAL — omit unless location adds meaningful signal
    dates: string            # "Mon YYYY – Mon YYYY" or "Mon YYYY – Present"
    roles:                   # always an array; single entry = one role, multiple entries = career progression
      - title: string
        dates: string        # OPTIONAL — omit if sole role (dates == company dates)
    projects:                # always an array, even for single-project companies
      - title: string        # OPTIONAL — omit if company has only one undivided role
        dates: string        # OPTIONAL — omit if same as company-level dates
        bullets:
          - string           # prose; **bold** allowed for key terms and sub-project names only

skills:
  - category: string
    items:
      - string

# draft-cv decides heading, grouping, and ordering of all bottom sections.
# Renderer iterates sections in order and formats each entry by kind.
# Omit entire sections block if nothing below experience/skills adds signal for the target JD.
sections:
  - heading: string          # e.g. "Education", "Education & Certifications", "Awards & Publications"
    entries:
      - kind: education
        degree: string
        institution: string
        gpa: string          # OPTIONAL
        dates: string

      - kind: certification
        title: string        # SHORT label — canonical name only, max ~50 chars
        description: string  # OPTIONAL — one line of context (e.g. "Distinction, 92%")
        issuer: string
        date: string
        url: string          # OPTIONAL

      - kind: award
        title: string        # SHORT label — canonical award name only, max ~50 chars
        description: string  # OPTIONAL — one line of context (e.g. "Cited as ideal model for community-funded projects")
        issuer: string       # e.g. "ABC Hackathon", "XYZ Foundation"
        date: string
        url: string          # OPTIONAL

      - kind: publication
        title: string        # SHORT label — max ~50 chars
        description: string  # OPTIONAL — one line of context (e.g. "Co-authored with 2 colleagues")
        venue: string        # journal, conference, or platform name
        date: string
        url: string          # OPTIONAL

      - kind: language
        language: string
        proficiency: string  # e.g. "native", "professional working proficiency"
